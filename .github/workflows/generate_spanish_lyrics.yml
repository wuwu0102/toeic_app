name: Generate Spanish Lyrics JSON

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube URL to process"
        required: true
        type: string
      translator:
        description: "Translator backend"
        required: false
        default: "dummy"
        type: choice
        options:
          - dummy
          - openai

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r side_projects/car-spanish-auto-pipeline/requirements.txt

      - name: Run subtitle pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd side_projects/car-spanish-auto-pipeline
          python -m src.cli \
            --url "${{ inputs.youtube_url }}" \
            --out "./output/result.json" \
            --prefer-subs \
            --translator "${{ inputs.translator }}"

      - name: Run project checks
        run: |
          cd side_projects/car-spanish-auto-pipeline
          PYTHONPATH=. python tests_or_checks/run_checks.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add side_projects/car-spanish-auto-pipeline/output/result.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update spanish lyrics result json"
            git push
          fi
